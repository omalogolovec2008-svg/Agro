<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Агро-помічник">
<title>🌿 Агро-помічник | Ваша Грядка</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --green-light: #c8f0a0; --green-mid: #8dc870;
  --border: rgba(200,240,160,0.18); --text: #f0fae0; --text-dim: rgba(240,250,224,0.5);
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
html, body { height: 100%; overflow: hidden; background: #0f2010; font-family: var(--font); color: var(--text); }
#app { display: flex; flex-direction: column; height: 100dvh; height: 100vh; max-width: 720px; margin: 0 auto; background: linear-gradient(160deg, #1a3a1a 0%, #162e10 100%); }
header { display: flex; align-items: center; gap: 10px; padding: 12px 16px 10px; border-bottom: 1px solid var(--border); background: rgba(15,32,16,0.6); flex-shrink: 0; }
.hicon { font-size: 28px; }
.htxt h1 { font-size: 16px; font-weight: 700; color: var(--green-light); }
.htxt p { font-size: 11px; color: var(--green-mid); }
.hbadge { margin-left: auto; background: rgba(74,158,42,0.25); border: 1px solid rgba(200,240,160,0.3); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--green-light); }
#messages { flex: 1; overflow-y: auto; padding: 14px 14px 8px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: rgba(200,240,160,0.2); border-radius: 3px; }
.row { display: flex; }
.row.user { justify-content: flex-end; }
.bub { max-width: 82%; padding: 10px 13px; font-size: 14px; line-height: 1.65; word-break: break-word; }
.bub.user { background: linear-gradient(135deg,#4a9e2a,#3a7e1a); border-radius: 18px 18px 4px 18px; color:#fff; box-shadow:0 2px 10px rgba(58,126,26,.4); }
.bub.bot { background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 18px 18px 18px 4px; }
.blabel { font-size: 10px; color: var(--green-mid); font-weight: 700; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
.typing { display:flex; align-items:center; gap:5px; padding:12px 14px; }
.typing span { width:7px; height:7px; background:var(--green-mid); border-radius:50%; animation:bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}
#chips { display:flex; flex-wrap:wrap; gap:7px; padding:6px 14px 4px; flex-shrink:0; }
.chip { background:rgba(74,158,42,.18); border:1px solid rgba(200,240,160,.28); border-radius:20px; padding:6px 12px; font-size:12px; color:var(--green-light); cursor:pointer; font-family:var(--font); }
.chip:active{background:rgba(74,158,42,.4)}
#inputbar { display:flex; align-items:flex-end; gap:9px; padding:10px 14px 14px; border-top:1px solid var(--border); background:rgba(15,32,16,.5); flex-shrink:0; }
@supports (padding-bottom: env(safe-area-inset-bottom)){#inputbar{padding-bottom:calc(14px + env(safe-area-inset-bottom))}}
#userinput { flex:1; background:rgba(255,255,255,.07); border:1px solid rgba(200,240,160,.28); border-radius:14px; padding:10px 14px; color:var(--text); font-size:15px; font-family:var(--font); resize:none; outline:none; line-height:1.5; min-height:44px; max-height:120px; }
#userinput:focus{border-color:rgba(200,240,160,.55)}
#userinput::placeholder{color:var(--text-dim)}
#sendbtn { width:44px; height:44px; border-radius:14px; border:none; background:linear-gradient(135deg,#4a9e2a,#3a7e1a); color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 2px 10px rgba(58,126,26,.5); transition:opacity .2s,transform .1s; }
#sendbtn:disabled{opacity:.35;box-shadow:none;cursor:not-allowed}
#sendbtn:not(:disabled):active{transform:scale(.93)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="hicon">🌿</div>
    <div class="htxt">
      <h1>Агро-помічник</h1>
      <p>Ваша Грядка · препарати та добрива</p>
    </div>
    <div class="hbadge">🔍 Веб-пошук</div>
  </header>
  <div id="messages"></div>
  <div id="chips">
    <button class="chip" onclick="useChip('Фітофтора картоплі')">🥔 Фітофтора картоплі</button>
    <button class="chip" onclick="useChip('Колорадський жук')">🐛 Колорадський жук</button>
    <button class="chip" onclick="useChip('Попелиця на розах')">🦗 Попелиця на розах</button>
    <button class="chip" onclick="useChip('Добрива для томатів')">🍅 Добрива для томатів</button>
    <button class="chip" onclick="useChip(\'Бур\'яни на городі\')">🌽 Бур'яни на городі</button>
    <button class="chip" onclick="useChip('Хвороби яблуні')">🍎 Хвороби яблуні</button>
  </div>
  <div id="inputbar">
    <textarea id="userinput" placeholder="Запитайте про препарат або хворобу..." rows="1"></textarea>
    <button id="sendbtn" disabled>↑</button>
  </div>
</div>
<script>
const SYSTEM = `Ти — експертний агрономічний помічник. Відповідай ВИКЛЮЧНО українською мовою.
Завдання: відповідати на питання про сільськогосподарські препарати, добрива, засоби захисту рослин.
При пошуку використовуй запити з "ваша грядка" або "vasha-gryadka.com.ua".
Давай конкретні поради: назва препарату, норма витрати, терміни обробки, культури, застереження.
Відповідай стисло до 250 слів. Важливі цифри і назви препаратів виділяй **жирним**.
Наприкінці завжди додавай: 🌐 vasha-gryadka.com.ua`;

const msgs = [{ role:"assistant", content:"Вітаю! 🌱 Я агрономічний помічник на основі сайту **Ваша Грядка**.\n\nПитайте про препарати, добрива чи хвороби рослин — знайду відповідь з актуальної бази!" }];
const msgsEl = document.getElementById('messages');
const inp = document.getElementById('userinput');
const btn = document.getElementById('sendbtn');
const chips = document.getElementById('chips');

function md(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}
function addMsg(role, content){
  const row = document.createElement('div');
  row.className = 'row ' + role;
  const b = document.createElement('div');
  b.className = 'bub ' + role;
  if(role==='bot') b.innerHTML = '<div class="blabel">🌱 Агроном</div><div>'+md(content)+'</div>';
  else b.textContent = content;
  row.appendChild(b);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return b;
}
function showTyping(){
  const r=document.createElement('div'); r.className='row bot'; r.id='tr';
  r.innerHTML='<div class="bub bot typing"><span></span><span></span><span></span></div>';
  msgsEl.appendChild(r); msgsEl.scrollTop=msgsEl.scrollHeight;
}
function hideTyping(){ const t=document.getElementById('tr'); if(t)t.remove(); }

addMsg('bot', msgs[0].content);

inp.addEventListener('input',()=>{
  btn.disabled=!inp.value.trim();
  inp.style.height='auto';
  inp.style.height=Math.min(inp.scrollHeight,120)+'px';
});
inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
btn.addEventListener('click',send);

function useChip(text){ inp.value=text; btn.disabled=false; send(); }

async function send(){
  const text=inp.value.trim();
  if(!text||btn.disabled) return;
  chips.style.display='none';
  msgs.push({role:'user',content:text});
  addMsg('user',text);
  inp.value=''; inp.style.height='auto'; btn.disabled=true;
  showTyping();
  
  const apiMsgs = msgs.map(m=>({ role: m.role==='bot'?'assistant':m.role, content: m.content }));
  const body = JSON.stringify({
    model:'claude-sonnet-4-6',
    max_tokens:1000,
    system: SYSTEM,
    tools:[{type:'web_search_20250305',name:'web_search'}],
    messages: apiMsgs
  });

  // Try direct first, then via proxy
  const endpoints = [
    { url: 'https://api.anthropic.com/v1/messages', headers: { 'Content-Type':'application/json', 'anthropic-dangerous-direct-browser-access':'true' } },
    { url: 'https://corsproxy.io/?url=https://api.anthropic.com/v1/messages', headers: { 'Content-Type':'application/json', 'anthropic-dangerous-direct-browser-access':'true' } }
  ];

  let reply = '';
  for (const ep of endpoints) {
    try {
      const res = await fetch(ep.url, { method:'POST', headers: ep.headers, body });
      if (!res.ok) continue;
      const data = await res.json();
      if(data.content){ for(const b of data.content){ if(b.type==='text') reply+=b.text; } }
      if(reply) break;
    } catch(e) { continue; }
  }

  hideTyping();
  if(!reply) reply='⚠️ Не вдалося отримати відповідь. Перевірте інтернет і спробуйте ще раз.';
  msgs.push({role:'bot',content:reply});
  addMsg('bot',reply);
}
</script>
</body>
</html>
