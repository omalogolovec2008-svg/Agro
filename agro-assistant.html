<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a1a">
<meta name="description" content="Агро-помічник — відповіді на питання про препарати та добрива для саду і городу">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Агро-помічник">
<title>🌿 Агро-помічник | Ваша Грядка</title>

<!-- PWA Manifest inline via JS -->
<script>
const manifest = {
  name: "Агро-помічник",
  short_name: "Агроном",
  description: "Відповіді про препарати та добрива",
  start_url: "./",
  display: "standalone",
  background_color: "#1a3a1a",
  theme_color: "#1a3a1a",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%231a3a1a' rx='32'/%3E%3Ctext y='130' x='96' font-size='110' text-anchor='middle'%3E🌿%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%231a3a1a' rx='80'/%3E%3Ctext y='360' x='256' font-size='300' text-anchor='middle'%3E🌿%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(blob);
document.write('<link rel="manifest" href="' + manifestURL + '">');
</script>

<!-- Apple touch icon inline SVG -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%231a3a1a' rx='32'/%3E%3Ctext y='130' x='90' font-size='110' text-anchor='middle'%3E🌿%3C/text%3E%3C/svg%3E">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg-deep: #0f2010;
    --bg-main: #1a3a1a;
    --bg-mid: #2d5a1b;
    --green-light: #c8f0a0;
    --green-mid: #8dc870;
    --green-dim: rgba(200,240,160,0.35);
    --bubble-user: linear-gradient(135deg, #4a9e2a, #3a7e1a);
    --bubble-bot: rgba(255,255,255,0.08);
    --border: rgba(200,240,160,0.18);
    --text: #f0fae0;
    --text-dim: rgba(240,250,224,0.5);
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    font-family: var(--font);
    color: var(--text);
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    height: 100vh;
    max-width: 720px;
    margin: 0 auto;
    background: linear-gradient(160deg, #1a3a1a 0%, #162e10 100%);
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,32,16,0.6);
    backdrop-filter: blur(8px);
    flex-shrink: 0;
  }
  .header-icon { font-size: 28px; line-height: 1; }
  .header-text h1 { font-size: 16px; font-weight: 700; color: var(--green-light); line-height: 1.2; }
  .header-text p { font-size: 11px; color: var(--green-mid); }
  .header-badge {
    margin-left: auto;
    background: rgba(74,158,42,0.25);
    border: 1px solid rgba(200,240,160,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: var(--green-light);
    white-space: nowrap;
  }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(200,240,160,0.2); border-radius: 3px; }

  .msg-row { display: flex; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot { justify-content: flex-start; }

  .bubble {
    max-width: 82%;
    padding: 10px 13px;
    font-size: 14px;
    line-height: 1.65;
    word-break: break-word;
  }
  .bubble.user {
    background: var(--bubble-user);
    border-radius: 18px 18px 4px 18px;
    color: #fff;
    box-shadow: 0 2px 10px rgba(58,126,26,0.4);
  }
  .bubble.bot {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 18px 18px 18px 4px;
    color: var(--text);
  }
  .bubble-label {
    font-size: 10px;
    color: var(--green-mid);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }

  /* Typing indicator */
  .typing { display: flex; align-items: center; gap: 5px; padding: 12px 14px; }
  .typing span {
    width: 7px; height: 7px;
    background: var(--green-mid);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity:.5; }
    30% { transform: translateY(-6px); opacity:1; }
  }

  /* QUICK CHIPS */
  #chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 6px 14px 4px;
    flex-shrink: 0;
  }
  .chip {
    background: rgba(74,158,42,0.18);
    border: 1px solid rgba(200,240,160,0.28);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--green-light);
    cursor: pointer;
    transition: background .15s;
    font-family: var(--font);
    white-space: nowrap;
  }
  .chip:active { background: rgba(74,158,42,0.4); }

  /* INPUT BAR */
  #inputbar {
    display: flex;
    align-items: flex-end;
    gap: 9px;
    padding: 10px 14px 14px;
    border-top: 1px solid var(--border);
    background: rgba(15,32,16,0.5);
    flex-shrink: 0;
  }
  /* extra bottom padding for iPhone home indicator */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #inputbar { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
  }

  #userinput {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(200,240,160,0.28);
    border-radius: 14px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 15px;
    font-family: var(--font);
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 44px;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color .2s;
  }
  #userinput:focus { border-color: rgba(200,240,160,0.55); }
  #userinput::placeholder { color: var(--text-dim); }

  #sendbtn {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #4a9e2a, #3a7e1a);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity .2s, transform .1s;
    box-shadow: 0 2px 10px rgba(58,126,26,0.5);
  }
  #sendbtn:disabled { opacity: .35; box-shadow: none; cursor: not-allowed; }
  #sendbtn:not(:disabled):active { transform: scale(.93); }

  /* Install banner */
  #installbanner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    background: rgba(74,158,42,0.2);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--green-light);
    flex-shrink: 0;
  }
  #installbanner.show { display: flex; }
  #installbtn {
    margin-left: auto;
    background: linear-gradient(135deg, #4a9e2a, #3a7e1a);
    border: none;
    border-radius: 10px;
    color: #fff;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
  }
  #closebanner {
    background: none; border: none; color: var(--text-dim);
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }
</style>
</head>
<body>
<div id="app">
  <!-- Install banner -->
  <div id="installbanner">
    📲 Додай на головний екран як застосунок
    <button id="installbtn">Встановити</button>
    <button id="closebanner">×</button>
  </div>

  <!-- Header -->
  <header>
    <div class="header-icon">🌿</div>
    <div class="header-text">
      <h1>Агро-помічник</h1>
      <p>Ваша Грядка · препарати та добрива</p>
    </div>
    <div class="header-badge">🔍 Веб-пошук</div>
  </header>

  <!-- Messages -->
  <div id="messages"></div>

  <!-- Quick chips (hidden after first message) -->
  <div id="chips">
    <button class="chip" onclick="useChip(this)">🥔 Фітофтора картоплі</button>
    <button class="chip" onclick="useChip(this)">🐛 Колорадський жук</button>
    <button class="chip" onclick="useChip(this)">🦗 Попелиця на розах</button>
    <button class="chip" onclick="useChip(this)">🍅 Добрива для томатів</button>
    <button class="chip" onclick="useChip(this)">🌽 Бур'яни на городі</button>
    <button class="chip" onclick="useChip(this)">🍎 Хвороби яблуні</button>
  </div>

  <!-- Input bar -->
  <div id="inputbar">
    <textarea id="userinput" placeholder="Запитайте про препарат або хворобу..." rows="1"></textarea>
    <button id="sendbtn" disabled>↑</button>
  </div>
</div>

<script>
const SYSTEM = `Ти — експертний агрономічний помічник. Відповідай ВИКЛЮЧНО українською мовою.

Твоє завдання:
1. Відповідати на питання про сільськогосподарські препарати, добрива, засоби захисту рослин
2. Використовуй інформацію з сайту "Ваша Грядка" (vasha-gryadka.com.ua) як основне джерело
3. При пошуку завжди додавай "site:vasha-gryadka.com.ua" або "ваша грядка" до запиту
4. Давай конкретні практичні поради: склад препарату, норму витрати, терміни обробки, культури, застереження
5. Відповідай стисло і по суті — до 250 слів
6. Використовуй **жирний** для важливих цифр і назв препаратів
7. Наприкінці завжди додавай: 🌐 vasha-gryadka.com.ua`;

const msgs = [
  { role: "assistant", content: "Вітаю! 🌱 Я агрономічний помічник на основі сайту **Ваша Грядка**.\n\nПитайте про препарати, добрива чи хвороби рослин — знайду відповідь з актуальної бази!" }
];

const msgsEl = document.getElementById('messages');
const input = document.getElementById('userinput');
const btn = document.getElementById('sendbtn');
const chips = document.getElementById('chips');

function renderMd(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function addMsg(role, content) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  const bub = document.createElement('div');
  bub.className = `bubble ${role}`;
  if (role === 'bot') {
    bub.innerHTML = `<div class="bubble-label">🌱 Агроном</div><div>${renderMd(content)}</div>`;
  } else {
    bub.textContent = content;
  }
  row.appendChild(bub);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return bub;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing-row';
  row.innerHTML = '<div class="bubble bot typing"><span></span><span></span><span></span></div>';
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function hideTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

// Render initial message
addMsg('bot', msgs[0].content);

input.addEventListener('input', () => {
  btn.disabled = !input.value.trim();
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
btn.addEventListener('click', send);

function useChip(el) {
  input.value = el.textContent.replace(/^[^\s]+\s/,'');
  btn.disabled = false;
  send();
}

async function send() {
  const text = input.value.trim();
  if (!text || btn.disabled) return;
  
  // Hide chips
  chips.style.display = 'none';
  
  msgs.push({ role: 'user', content: text });
  addMsg('user', text);
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: msgs.map(m => ({ role: m.role === 'bot' ? 'assistant' : m.role, content: m.content }))
      })
    });

    const data = await res.json();
    let reply = '';
    if (data.content) {
      for (const b of data.content) {
        if (b.type === 'text') reply += b.text;
      }
    }
    if (!reply) reply = 'Вибачте, не вдалося отримати відповідь. Спробуйте ще раз.';

    hideTyping();
    msgs.push({ role: 'bot', content: reply });
    addMsg('bot', reply);
  } catch(e) {
    hideTyping();
    addMsg('bot', '⚠️ Помилка з\'єднання. Перевірте інтернет і спробуйте знову.');
  }
}

// ── PWA Install prompt ──
let deferredPrompt = null;
const banner = document.getElementById('installbanner');
const installBtn = document.getElementById('installbtn');
const closeBtn = document.getElementById('closebanner');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  banner.classList.add('show');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.classList.remove('show');
});

closeBtn.addEventListener('click', () => banner.classList.remove('show'));

window.addEventListener('appinstalled', () => banner.classList.remove('show'));

// ── Service Worker for offline shell ──
if ('serviceWorker' in navigator) {
  const swCode = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => clients.claim());
self.addEventListener('fetch', e => {
  if (e.request.url.includes('api.anthropic.com')) return;
  e.respondWith(
    caches.open('agro-v1').then(cache =>
      fetch(e.request).then(res => { cache.put(e.request, res.clone()); return res; })
        .catch(() => caches.match(e.request))
    )
  );
});`;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
</body>
</html>
